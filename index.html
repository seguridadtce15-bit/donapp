<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba de Conexión</title>
</head>
<body style="font-family: sans-serif; padding: 20px;">

    <h2>Enviar Dato de Prueba a Excel</h2>
    <button onclick="enviarDatoPrueba()" style="padding: 10px 20px; font-weight: bold; cursor: pointer;">
        Enviar "Hola Mundo"
    </button>

    <script>
        // REEMPLAZA ESTA URL CON TU URL DE IMPLEMENTACIÓN DE APPS SCRIPT
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwAUn2qZhRO2vxqxvK9akhfJ12yvV0uk2VkXHT486NoXBXF2FW2KcXZTeCzqpTWNLM/exec";

        async function enviarDatoPrueba() {
            try {
                let res = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: "Hola Mundo" // Texto plano simple
                });
                let data = await res.json();
                
                if (data.success) {
                    alert("¡Éxito! Dato capturado en el Excel: " + data.guardado);
                } else {
                    alert("Error en el servidor: " + data.error);
                }
            } catch (e) {
                alert("Error de conexión. Asegúrate de haber publicado una 'Nueva versión' y que el acceso sea público.");
            }
        }
    </script>
</body>
</html>
