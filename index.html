<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plataforma Banco de Sangre</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

  <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-6 space-y-6 border-t-8 border-red-700">
    
    <!-- Encabezado -->
    <div class="text-center">
      <h1 class="text-2xl font-bold text-gray-800 flex justify-center items-center gap-2">
        ❤️ Banco de Sangre
      </h1>
      <p class="text-gray-500 text-sm mt-1">Conectando héroes con vidas que salvar</p>
    </div>

    <!-- Pestañas de Navegación -->
    <div class="flex border-b border-gray-200">
      <button id="tabDonar" onclick="cambiarPestaña('donar')" class="w-1/2 py-2 text-center font-semibold text-sm border-b-2 border-red-600 text-red-600 focus:outline-none transition duration-150 cursor-pointer">
        Quiero Donar
      </button>
      <button id="tabSolicitar" onclick="cambiarPestaña('solicitar')" class="w-1/2 py-2 text-center font-semibold text-sm border-b-2 border-transparent text-gray-500 hover:text-gray-700 focus:outline-none transition duration-150 cursor-pointer">
        Necesito Donadores
      </button>
    </div>

    <!-- SECCIÓN DE CONTADORES DE DONADORES (AZUL BRILLANTE) -->
    <div id="contenedorContadores" class="bg-blue-50 border border-blue-100 rounded-xl p-3">
      <p class="text-xs font-bold text-blue-900 mb-2 text-center flex justify-center items-center gap-1">📊 Donadores Voluntarios Registrados</p>
      <div class="grid grid-cols-4 gap-2 text-center text-xs font-bold">
        <div class="bg-white p-1.5 rounded-lg border border-blue-200">O+ <span id="cnt-O+" class="block text-blue-600 text-sm font-extrabold mt-0.5">0</span></div>
        <div class="bg-white p-1.5 rounded-lg border border-blue-200">O- <span id="cnt-O-" class="block text-blue-600 text-sm font-extrabold mt-0.5">0</span></div>
        <div class="bg-white p-1.5 rounded-lg border border-blue-200">A+ <span id="cnt-A+" class="block text-blue-600 text-sm font-extrabold mt-0.5">0</span></div>
        <div class="bg-white p-1.5 rounded-lg border border-blue-200">A- <span id="cnt-A-" class="block text-blue-600 text-sm font-extrabold mt-0.5">0</span></div>
        <div class="bg-white p-1.5 rounded-lg border border-blue-200">B+ <span id="cnt-B+" class="block text-blue-600 text-sm font-extrabold mt-0.5">0</span></div>
        <div class="bg-white p-1.5 rounded-lg border border-blue-200">B- <span id="cnt-B-" class="block text-blue-600 text-sm font-extrabold mt-0.5">0</span></div>
        <div class="bg-white p-1.5 rounded-lg border border-blue-200">AB+<span id="cnt-AB+" class="block text-blue-600 text-sm font-extrabold mt-0.5">0</span></div>
        <div class="bg-white p-1.5 rounded-lg border border-blue-200">AB-<span id="cnt-AB-" class="block text-blue-600 text-sm font-extrabold mt-0.5">0</span></div>
      </div>
    </div>

    <!-- FORMULARIO DONADORES -->
    <form id="formDonador" onsubmit="enviarDatosDonador(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre Completo</label>
        <input type="text" id="nombre" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Tipo de Sangre</label>
          <select id="tipoSangre" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
            <option value="">Selecciona</option>
            <option value="O+">O Rh+</option>
            <option value="O-">O Rh-</option>
            <option value="A+">A Rh+</option>
            <option value="A-">A Rh-</option>
            <option value="B+">B Rh+</option>
            <option value="B-">B Rh-</option>
            <option value="AB+">AB Rh+</option>
            <option value="AB-">AB Rh-</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Teléfono (10 dígitos)</label>
          <input type="text" id="telefono" required maxlength="10" pattern="\d{10}" title="Introduce exactamente 10 números" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Ej: 2293254386">
        </div>
      </div>

      <!-- NUEVO MENÚ DESPLEGABLE PARA CIUDAD DEL DONADOR -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Ciudad donde resides</label>
        <select id="ciudadDonador" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 bg-white">
          <option value="">Cargando ciudades...</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">¿Cuándo fue tu última donación? (Opcional)</label>
        <input type="date" id="ultimaDonacion" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
      </div>

      <button type="submit" id="btnEnviarDonador" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 cursor-pointer text-center shadow-md">
        Registrarme como Donador
      </button>
    </form>

    <!-- FORMULARIO SOLICITUDES -->
    <form id="formSolicitante" onsubmit="enviarDatosSolicitud(event)" class="space-y-4 hidden">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre del Familiar o Paciente</label>
        <input type="text" id="nombreContacto" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Sangre Requerida</label>
          <select id="tipoSangreRequerido" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
            <option value="">Selecciona</option>
            <option value="O+">O Rh+</option>
            <option value="O-">O Rh-</option>
            <option value="A+">A Rh+</option>
            <option value="A-">A Rh-</option>
            <option value="B+">B Rh+</option>
            <option value="B-">B Rh-</option>
            <option value="AB+">AB Rh+</option>
            <option value="AB-">AB Rh-</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Teléfono de Contacto</label>
          <input type="text" id="telefonoContacto" required maxlength="10" pattern="\d{10}" title="Introduce exactamente 10 números" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Ej: 2293254386">
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Ciudad de la Urgencia</label>
        <select id="ciudadUrgencia" onchange="filtrarHospitalesPorCiudad()" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 bg-white">
          <option value="">Cargando ciudades...</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Hospital de la Urgencia</label>
        <select id="hospital" required disabled class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 bg-gray-50 cursor-not-allowed">
          <option value="">Primero selecciona una ciudad</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Detalles Adicionales</label>
        <textarea id="detalles" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Ej: Se necesitan 4 donadores..."></textarea>
      </div>

      <button type="submit" id="btnEnviarSolicitud" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-4 rounded-lg transition duration-200 cursor-pointer text-center shadow-md">
        Publicar Solicitud Urgente
      </button>
    </form>

    <div id="mensajeEstado" class="hidden p-3 rounded-lg text-sm font-medium"></div>

    <!-- SECCIÓN: HISTORIAL DE CASOS ACTIVOS -->
    <div id="seccionHistorial" class="border-t border-gray-200 pt-4 hidden">
      <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-1.5">🚨 Casos Urgentes Activos</h3>
      <div id="listaCasos" class="space-y-3 max-h-60 overflow-y-auto pr-1">
        <p class="text-xs text-gray-400 text-center py-2">No hay solicitudes urgentes activas en este momento.</p>
      </div>
    </div>

  </div>

  <script>
    const URL_API = "https://script.google.com/macros/s/AKfycbyBP3M0AuiZxmu_AAxAgK1qmns39bXElJBEsXk9525egqSd3CcDPuehT04F2tD05oYd/exec";
    let baseDatosUbicaciones = {};

    document.addEventListener("DOMContentLoaded", () => {
      const hoy = new Date().toISOString().split("T")[0];
      document.getElementById("ultimaDonacion").setAttribute("max", hoy);
      cargarDatosIniciales();
    });

    function cargarDatosIniciales() {
      const selectCiudadUrgencia = document.getElementById("ciudadUrgencia");
      const selectCiudadDonador = document.getElementById("ciudadDonador");
      
      fetch(URL_API)
        .then(res => res.json())
        .then(data => {
          if (data.exito) {
            baseDatosUbicaciones = data.mapa;
            
            // Limpiar y llenar ambos menús desplegables con las mismas ciudades precargadas
            selectCiudadUrgencia.innerHTML = '<option value="">Selecciona la Ciudad</option>';
            selectCiudadDonador.innerHTML = '<option value="">Selecciona tu Ciudad</option>';
            
            Object.keys(baseDatosUbicaciones).forEach(ciudad => {
              // Opción para formulario de solicitudes
              const optUrgencia = document.createElement("option");
              optUrgencia.value = city = ciudad;
              optUrgencia.textContent = ciudad;
              selectCiudadUrgencia.appendChild(optUrgencia);
              
              // Opción para formulario de donadores
              const optDonador = document.createElement("option");
              optDonador.value = ciudad;
              optDonador.textContent = ciudad;
              selectCiudadDonador.appendChild(optDonador);
            });

            // Cargar contadores numéricos en azul brillante
            if (data.contadores) {
              Object.keys(data.contadores).forEach(sangre => {
                const el = document.getElementById(`cnt-${sangre}`);
                if (el) el.textContent = data.contadores[sangre];
              });
            }

            // Cargar Historial de Casos Activos
            renderizarHistorial(data.solicitudes);
          }
        })
        .catch(() => {
          selectCiudadUrgencia.innerHTML = '<option value="">Error al sincronizar</option>';
          selectCiudadDonador.innerHTML = '<option value="">Error al sincronizar</option>';
        });
    }

    function renderizarHistorial(solicitudes) {
      const contenedor = document.getElementById("listaCasos");
      if (!solicitudes || solicitudes.length === 0) {
        contenedor.innerHTML = '<p class="text-xs text-gray-400 text-center py-2">No hay solicitudes urgentes activas.</p>';
        return;
      }

      contenedor.innerHTML = "";
      solicitudes.forEach(sol => {
        const div = document.createElement("div");
        div.className = "bg-gray-50 border border-gray-200 rounded-xl p-3 text-xs space-y-2 relative";
        div.innerHTML = `
          <div><strong>Paciente:</strong> ${sol.paciente}</div>
          <div class="grid grid-cols-2 gap-1">
            <div><strong>Tipo:</strong> <span class="text-red-600 font-bold">${sol.sangre}</span></div>
            <div><strong>Hospital:</strong> ${sol.hospital}</div>
          </div>
          ${sol.detalles ? `<div class="text-gray-500 italic">"${sol.detalles}"</div>` : ''}
          <button onclick="marcarComoAtendida(${sol.idFila}, this)" class="w-full bg-white border border-green-600 text-green-700 hover:bg-green-50 font-bold py-1.5 px-2 rounded-lg transition duration-150 cursor-pointer text-center text-[11px] mt-1 shadow-sm">
            ✅ ¡Donadores Conseguidos!
          </button>
        `;
        contenedor.appendChild(div);
      });
    }

    function marcarComoAtendida(idFila, boton) {
      boton.disabled = true;
      boton.innerText = "Actualizando caso...";
      
      fetch(URL_API, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ tipoAccion: "resolver", idFila: idFila })
      })
      .then(res => res.json())
      .then(res => {
        if (res.exito) {
          cargarDatosIniciales();
        }
      })
      .catch(() => {
        boton.disabled = false;
        boton.innerText = "❌ Error, reintentar";
      });
    }

    function filtrarHospitalesPorCiudad() {
      const ciudadSeleccionada = document.getElementById("ciudadUrgencia").value;
      const selectHospital = document.getElementById("hospital");
      selectHospital.innerHTML = '<option value="">Selecciona el Hospital</option>';
      
      if (ciudadSeleccionada && baseDatosUbicaciones[ciudadSeleccionada]) {
        selectHospital.disabled = false;
        selectHospital.className = "w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 bg-white cursor-pointer";
        baseDatosUbicaciones[ciudadSeleccionada].forEach(hosp => {
          const opt = document.createElement("option");
          opt.value = hosp;
          opt.textContent = hosp;
          selectHospital.appendChild(opt);
        });
      } else {
        selectHospital.disabled = true;
        selectHospital.className = "w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 bg-gray-50 cursor-not-allowed";
        selectHospital.innerHTML = '<option value="">Primero selecciona una ciudad</option>';
      }
    }

    function cambiarPestaña(pestaña) {
      const formDonador = document.getElementById('formDonador');
      const formSolicitante = document.getElementById('formSolicitante');
      const tabDonar = document.getElementById('tabDonar');
      const tabSolicitar = document.getElementById('tabSolicitar');
      const contadores = document.getElementById('contenedorContadores');
      const historial = document.getElementById('seccionHistorial');
      document.getElementById('mensajeEstado').classList.add('hidden');

      if (pestaña === 'donar') {
        formDonador.classList.remove('hidden');
        formSolicitante.classList.add('hidden');
        contadores.classList.remove('hidden');
        historial.classList.add('hidden');
        tabDonar.className = "w-1/2 py-2 text-center font-semibold text-sm border-b-2 border-red-600 text-red-600 focus:outline-none cursor-pointer";
        tabSolicitar.className = "w-1/2 py-2 text-center font-semibold text-sm border-b-2 border-transparent text-gray-500 hover:text-gray-700 focus:outline-none cursor-pointer";
      } else {
        formDonador.classList.add('hidden');
        formSolicitante.classList.remove('hidden');
        contadores.classList.add('hidden');
        historial.classList.remove('hidden');
        tabDonar.className = "w-1/2 py-2 text-center font-semibold text-sm border-b-2 border-transparent text-gray-500 hover:text-gray-700 focus:outline-none cursor-pointer";
        tabSolicitar.className = "w-1/2 py-2 text-center font-semibold text-sm border-b-2 border-gray-800 text-gray-800 focus:outline-none cursor-pointer";
      }
    }

    function enviarDatosDonador(e) {
      e.preventDefault();
      const btn = document.getElementById('btnEnviarDonador');
      const datos = {
        tipoAccion: "donar",
        nombre: document.getElementById('nombre').value,
        tipoSangre: document.getElementById('tipoSangre').value,
        telefono: document.getElementById('telefono').value,
        ciudad: document.getElementById('ciudadDonador').value, // Envía el valor seleccionado del menú desplegable
        ultimaDonacion: document.getElementById('ultimaDonacion').value
      };
      procesarEnvio(btn, datos, 'formDonador');
    }

    function enviarDatosSolicitud(e) {
      e.preventDefault();
      const btn = document.getElementById('btnEnviarSolicitud');
      const datos = {
        tipoAccion: "solicitar",
        nombreContacto: document.getElementById('nombreContacto').value,
        tipoSangreRequerido: document.getElementById('tipoSangreRequerido').value,
        hospital: document.getElementById('hospital').value,
        ciudad: document.getElementById('ciudadUrgencia').value,
        telefonoContacto: document.getElementById('telefonoContacto').value,
        detalles: document.getElementById('detalles').value
      };
      procesarEnvio(btn, datos, 'formSolicitante');
    }

    function procesarEnvio(btn, datos, idFormulario) {
      const mensajeDiv = document.getElementById('mensajeEstado');
      const textoOriginal = btn.innerText;
      
      btn.disabled = true;
      btn.innerText = "Procesando...";
      mensajeDiv.classList.add('hidden');

      fetch(URL_API, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(datos)
      })
      .then(res => res.json())
      .then(respuesta => {
        btn.disabled = false;
        btn.innerText = textoOriginal;
        
        if (respuesta.exito) {
          document.getElementById(idFormulario).reset();
          if(idFormulario === 'formSolicitante') {
             document.getElementById("hospital").disabled = true;
             document.getElementById("hospital").className = "w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 bg-gray-50 cursor-not-allowed";
          }
          
          cargarDatosIniciales(); // Recargar la info para actualizar los contadores al momento

          if (respuesta.tipo === "donar") {
            mensajeDiv.className = "p-3 rounded-lg text-sm text-center font-medium bg-green-100 text-green-700 shadow-sm";
            mensajeDiv.innerText = "¡Registro exitoso! Gracias por sumarte como donador voluntario.";
          } 
          else if (respuesta.tipo === "solicitar") {
            mensajeDiv.className = "p-4 rounded-lg text-sm bg-blue-50 text-blue-900 border border-blue-200 space-y-3 shadow-inner text-left";
            let htmlResultado = `<p class="font-bold text-base text-blue-950">🚨 ¡Solicitud publicada con éxito!</p>`;
            
            if (respuesta.donadores && respuesta.donadores.length > 0) {
              htmlResultado += `<p class="text-xs text-gray-700">Hemos localizado <strong>${respuesta.donadores.length} donador(es)</strong> compatibles. Los ubicados en <strong>${datos.ciudad}</strong> aparecen primero:</p><div class="space-y-2 mt-2">`;
              
              respuesta.donadores.forEach(donador => {
                let textoMensaje = encodeURIComponent(`Hola ${donador.nombre}, disculpa la molestia. Vi en la plataforma que eres donador voluntario tipo ${respuesta.sangre}. Tenemos una situación médica urgente en el hospital ${respuesta.hospital} de ${datos.ciudad}. ¿Habría alguna posibilidad de que nos apoyes? Muchas gracias.`);
                let linkWhatsapp = `https://wa.me/${donador.telefono}?text=${textoMensaje}`;
                
                htmlResultado += `
                  <a href="${linkWhatsapp}" target="_blank" class="flex items-center justify-between bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 px-3 rounded-xl text-xs transition duration-150 shadow-md decoration-none">
                    <span>🟢 Contactar a ${donador.nombre} (${donador.ciudad})</span>
                    <span class="bg-green-800 text-white text-[10px] px-2 py-0.5 rounded-full whitespace-nowrap">Enviar mensaje</span>
                  </a>`;
              });
              htmlResultado += `</div>`;
            } else {
              htmlResultado += `<p class="text-xs text-gray-600">Por el momento no contamos con donadores registrados tipo <strong>${respuesta.sangre}</strong> en el sistema, pero la alerta ha sido almacenada.</p>`;
            }
            mensajeDiv.innerHTML = htmlResultado;
          }
          mensajeDiv.classList.remove('hidden');
        } else {
          mensajeDiv.className = "p-3 rounded-lg text-sm text-center font-medium bg-red-100 text-red-700";
          mensajeDiv.innerText = "Error: " + respuesta.mensaje;
          mensajeDiv.classList.remove('hidden');
        }
      })
      .catch(() => {
        btn.disabled = false;
        btn.innerText = textoOriginal;
        mensajeDiv.className = "p-3 rounded-lg text-sm text-center font-medium bg-red-100 text-red-700";
        mensajeDiv.innerText = "Error de conexión. Verifica la configuración.";
        mensajeDiv.classList.remove('hidden');
      });
    }
  </script>
</body>
</html>
